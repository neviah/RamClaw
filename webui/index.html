<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RamClaw</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; background: #0f172a; color: #e2e8f0; }
    .panel { max-width: 960px; margin: 0 auto; padding: 1.5rem; border: 1px solid #1e293b; border-radius: 12px; background: linear-gradient(135deg, #111827, #0b1224); }
    textarea { width: 100%; height: 120px; margin-top: 0.5rem; background: #0b1224; color: #e2e8f0; border: 1px solid #1e293b; border-radius: 8px; padding: 0.75rem; }
    button { background: #22d3ee; color: #0b1224; border: none; padding: 0.75rem 1.25rem; border-radius: 8px; cursor: pointer; font-weight: 700; }
    button:disabled { background: #334155; cursor: not-allowed; }
    pre { background: #0b1224; padding: 1rem; border-radius: 8px; overflow: auto; border: 1px solid #1e293b; }
    a { color: #38bdf8; }
  </style>
</head>
<body>
  <div class="panel">
    <h1>RamClaw</h1>
    <p>Fully sandboxed, LM Studio only. No cloud providers, no setup required.</p>
    <label for="task">Task</label>
    <textarea id="task" placeholder="What should RamClaw do?"></textarea>
    <div style="margin-top: 1rem; display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap;">
      <button id="run">Run Task</button>
      <button id="showKey">Show GitHub Public Key</button>
      <a id="workspaceLink" href="#" target="_blank">Open workspace folder</a>
    </div>
    <h3>Logs</h3>
    <pre id="log"></pre>
  </div>
  <script src="script.js"></script>
</body>
</html>
